<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Premium Downloader</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  /* Default: Light Mode (Pink Theme) */
  --bg-color: #fff5f7;
  --accent-color: #fe2c55; /* TikTok Pink/Red */
  --container-bg: rgba(255, 255, 255, 0.8);
  --text-color: #333;
  --input-bg: #fff;
}

@media (prefers-color-scheme: dark) {
  :root {
    /* Dark Mode (Red Theme) */
    --bg-color: #0b0b0b;
    --accent-color: #ff0000; /* Pure Red */
    --container-bg: rgba(20, 20, 20, 0.7);
    --text-color: #fff;
    --input-bg: #1a1a1a;
  }
}

body {
  margin: 0;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background-color: var(--bg-color);
  background-image: radial-gradient(circle at 20% 30%, var(--accent-color) 0%, transparent 20%),
                    radial-gradient(circle at 80% 70%, #00f2ea 0%, transparent 20%);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: var(--text-color);
}

.container {
  background: var(--container-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 40px 30px;
  border-radius: 30px;
  width: 90%;
  max-width: 450px;
  text-align: center;
  box-shadow: 0 25px 50px rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.1);
  animation: slideUp 0.8s ease-out;
}

.logo-icon {
  font-size: 50px;
  margin-bottom: 15px;
  color: var(--accent-color);
  filter: drop-shadow(0 0 10px var(--accent-color));
}

h1 {
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 30px;
  letter-spacing: -0.5px;
}

.input-group {
  position: relative;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 15px 20px;
  border-radius: 15px;
  border: 2px solid transparent;
  outline: none;
  background: var(--input-bg);
  color: var(--text-color);
  box-sizing: border-box;
  font-size: 16px;
  transition: 0.3s;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

input:focus {
  border-color: var(--accent-color);
}

button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 15px;
  background: var(--accent-color);
  color: white;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(255, 0, 80, 0.3);
}

button:active {
  transform: translateY(0);
}

#result {
  margin-top: 30px;
}

.video-card {
  background: rgba(0,0,0,0.05);
  border-radius: 20px;
  padding: 10px;
  overflow: hidden;
}

video {
  width: 100%;
  border-radius: 15px;
  display: block;
}

.download-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 15px;
  padding: 12px;
  background: #00f2ea;
  color: #000;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.download-btn:hover {
  background: #fff;
  filter: brightness(1.1);
}

@keyframes slideUp {
  from {opacity: 0; transform: translateY(30px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Loader Style */
.loader {
  border: 4px solid rgba(255,255,255,0.3);
  border-top: 4px solid var(--accent-color);
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
  margin: 10px auto;
}

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <div class="logo-icon"><i class="fab fa-tiktok"></i></div>
  <h1>TikTok Downloader</h1>
  
  <div class="input-group">
    <input type="text" id="url" placeholder="Paste link here...">
  </div>
  
  <button onclick="downloadVideo()">
    <i class="fas fa-cloud-download-alt"></i> Get Video
  </button>

  <div id="result"></div>
</div>

<script>
async function downloadVideo() {
  const url = document.getElementById("url").value;
  const result = document.getElementById("result");

  if (!url) {
    alert("Please enter a valid TikTok URL");
    return;
  }

  result.innerHTML = '<div class="loader"></div><p>Fetching Premium Quality...</p>';

  try {
    const response = await fetch(`https://tikwm.com/api/?url=${encodeURIComponent(url)}`);
    const data = await response.json();

    if (data && data.data && data.data.play) {
      const videoUrl = data.data.play;
      const title = data.data.title || "tiktok_video";

      result.innerHTML = `
        <div class="video-card">
          <video controls id="mainVideo" src="${videoUrl}"></video>
          <a class="download-btn" href="javascript:void(0)" onclick="forceDownload('${videoUrl}', '${title}.mp4')">
            <i class="fas fa-download"></i> Save to Device
          </a>
        </div>
      `;
    } else {
      result.innerHTML = "<p style='color:red;'>❌ Failed to fetch video. Try another link.</p>";
    }

  } catch (error) {
    result.innerHTML = "<p style='color:red;'>⚠️ Connection Error!</p>";
  }
}

// Function to force browser to download the file instead of just opening it
async function forceDownload(videoUrl, fileName) {
  try {
    const response = await fetch(videoUrl);
    const blob = await response.blob();
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.style.display = 'none';
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    window.URL.revokeObjectURL(url);
    alert("Download Started!");
  } catch (e) {
    // Fallback if blob download fails
    window.open(videoUrl, '_blank');
  }
}
</script>

</body>
</html>
