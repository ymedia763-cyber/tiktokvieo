<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Pro Downloader</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --bg-color: #fff5f7;
  --accent-color: #fe2c55;
  --container-bg: rgba(255, 255, 255, 0.85);
  --text-color: #1a1a1a;
  --card-bg: #ffffff;
  --yt-red: #ff0000;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-color: #080808;
    --accent-color: #ff0000;
    --container-bg: rgba(20, 20, 20, 0.8);
    --text-color: #eeeeee;
    --card-bg: #1e1e1e;
  }
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background-color: var(--bg-color);
  background-image: radial-gradient(circle at 10% 20%, var(--accent-color) 0%, transparent 25%),
                    radial-gradient(circle at 90% 80%, #00f2ea 0%, transparent 25%);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: var(--text-color);
}

/* Floating YouTube Button */
.yt-header-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  background: var(--yt-red);
  color: white;
  padding: 8px 15px;
  border-radius: 50px;
  text-decoration: none;
  font-size: 12px;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
  transition: 0.3s;
  z-index: 100;
}
.yt-header-btn:hover { transform: scale(1.05); background: white; color: var(--yt-red); }

.container {
  background: var(--container-bg);
  backdrop-filter: blur(25px);
  padding: 30px;
  border-radius: 30px;
  width: 95%;
  max-width: 480px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
  position: relative;
}

.logo-icon { font-size: 45px; color: var(--accent-color); margin-bottom: 10px; }

.input-wrapper {
  position: relative;
  background: var(--card-bg);
  border-radius: 15px;
  padding: 5px;
  display: flex;
  align-items: center;
  margin-bottom: 15px;
  border: 2px solid transparent;
}
.input-wrapper:focus-within { border-color: var(--accent-color); }

input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 12px;
  color: var(--text-color);
  outline: none;
  font-size: 14px;
}

.control-btn { background: none; border: none; color: var(--accent-color); padding: 10px; cursor: pointer; font-size: 12px; font-weight: bold; }

.main-btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 15px;
  background: var(--accent-color);
  color: white;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  transition: 0.3s;
}

/* Video Stats Card */
.video-info-card {
  margin-top: 25px;
  background: var(--card-bg);
  border-radius: 20px;
  padding: 15px;
  text-align: left;
  animation: fadeIn 0.5s ease;
}

.detail-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.yt-inline-btn {
  background: var(--yt-red);
  color: white;
  padding: 5px 12px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 15px 0;
  text-align: center;
}

.stat-item {
  background: rgba(128,128,128,0.1);
  padding: 8px;
  border-radius: 10px;
  font-size: 13px;
}
.stat-item i { color: var(--accent-color); }

.description-box {
  font-size: 13px;
  background: rgba(0,0,0,0.05);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 15px;
}

.copy-desc { float: right; color: #00f2ea; cursor: pointer; font-size: 12px; }

video { width: 100%; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

.download-link {
  display: block;
  text-align: center;
  background: #00f2ea;
  color: #000;
  padding: 14px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  margin-top: 15px;
}

@keyframes fadeIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} }
</style>
</head>
<body>

<div class="container">
  <a href="https://youtube.com/@yasiriqbal_01?si=1B-ou6ua6Y1SwjxG+?sub_confirmation=1" target="_blank" class="yt-header-btn">
    <i class="fab fa-youtube"></i> Subscribe
  </a>

  <div class="logo-icon"><i class="fab fa-tiktok"></i></div>
  <h2 style="margin:0 0 20px 0">TikTok Pro</h2>
  
  <div class="input-wrapper">
    <input type="text" id="url" placeholder="Paste link here...">
    <button class="control-btn" onclick="pasteLink()">PASTE</button>
    <button class="control-btn" onclick="clearLink()" style="color:#888">CLEAR</button>
  </div>
  
  <button class="main-btn" onclick="fetchVideo()">
    <i class="fas fa-magic"></i> ANALYZE VIDEO
  </button>

  <div id="result"></div>
</div>

<script>
async function pasteLink() {
  const text = await navigator.clipboard.readText();
  document.getElementById("url").value = text;
}

function clearLink() {
  document.getElementById("url").value = "";
  document.getElementById("result").innerHTML = "";
}

async function fetchVideo() {
  const url = document.getElementById("url").value;
  const result = document.getElementById("result");
  if (!url) { alert("Please paste a link!"); return; }

  result.innerHTML = '<p>⏳ Fetching Premium Details...</p>';

  try {
    const response = await fetch(`https://tikwm.com/api/?url=${encodeURIComponent(url)}`);
    const json = await response.json();
    const data = json.data;

    if (data) {
      result.innerHTML = `
        <div class="video-info-card">
          <div class="detail-header">
            <strong style="font-size:14px">Video Details</strong>
            <a href="https://youtube.com/@yasiriqbal_01?si=1B-ou6ua6Y1SwjxG+" target="_blank" class="yt-inline-btn">
              <i class="fab fa-youtube"></i> Subscribe
            </a>
          </div>

          <video controls src="${data.play}"></video>
          
          <div class="stats-grid">
            <div class="stat-item"><i class="fas fa-heart"></i><br>${data.digg_count}</div>
            <div class="stat-item"><i class="fas fa-comment"></i><br>${data.comment_count}</div>
            <div class="stat-item"><i class="fas fa-share"></i><br>${data.share_count}</div>
          </div>

          <div class="description-box">
            <span class="copy-desc" onclick="copyText('${data.title.replace(/'/g, "\\'")}')">
              <i class="fas fa-copy"></i> Copy
            </span>
            <strong>Caption:</strong><br>
            <span id="descText">${data.title || "No caption provided."}</span>
          </div>

          <a class="download-link" href="javascript:void(0)" onclick="forceDownload('${data.play}', 'tiktok_video.mp4')">
            <i class="fas fa-download"></i> START DOWNLOAD
          </a>
        </div>
      `;
    } else {
      result.innerHTML = "<p>❌ Video not found!</p>";
    }
  } catch (e) {
    result.innerHTML = "<p>⚠️ Error connecting to server.</p>";
  }
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("Description Copied!");
}

async function forceDownload(videoUrl, fileName) {
  const response = await fetch(videoUrl);
  const blob = await response.blob();
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  window.URL.revokeObjectURL(url);
}
</script>

</body>
</html>
