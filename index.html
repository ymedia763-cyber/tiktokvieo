<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Pro Downloader</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --bg-color: #fff5f7;
  --accent-color: #fe2c55;
  --container-bg: rgba(255, 255, 255, 0.85);
  --text-color: #1a1a1a;
  --card-bg: #ffffff;
  --yt-red: #ff0000;
  --wa-green: #25D366;
  --tt-black: #010101;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-color: #080808;
    --accent-color: #ff0000;
    --container-bg: rgba(20, 20, 20, 0.85);
    --text-color: #eeeeee;
    --card-bg: #1e1e1e;
  }
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background-color: var(--bg-color);
  background-image: radial-gradient(circle at 10% 20%, var(--accent-color) 0%, transparent 25%),
                    radial-gradient(circle at 90% 80%, #00f2ea 0%, transparent 25%);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px 0;
  color: var(--text-color);
}

/* Social Header Buttons */
.social-header {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.social-btn {
  padding: 8px 15px;
  border-radius: 50px;
  text-decoration: none;
  font-size: 11px;
  font-weight: bold;
  color: white;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: 0.3s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.btn-yt { background: var(--yt-red); }
.btn-tt { background: var(--tt-black); }
.btn-wa { background: var(--wa-green); }

.social-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.2); filter: brightness(1.1); }

.container {
  background: var(--container-bg);
  backdrop-filter: blur(25px);
  padding: 30px;
  border-radius: 30px;
  width: 95%;
  max-width: 480px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
}

.logo-icon { font-size: 50px; color: var(--accent-color); margin-bottom: 10px; }

.input-wrapper {
  background: var(--card-bg);
  border-radius: 15px;
  padding: 5px;
  display: flex;
  align-items: center;
  margin-bottom: 15px;
  border: 2px solid transparent;
}
.input-wrapper:focus-within { border-color: var(--accent-color); }

input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 12px;
  color: var(--text-color);
  outline: none;
}

.control-btn { background: none; border: none; color: var(--accent-color); padding: 10px; cursor: pointer; font-weight: bold; font-size: 12px; }

.main-btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 15px;
  background: var(--accent-color);
  color: white;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  font-size: 16px;
}

/* Info Card */
.video-info-card {
  margin-top: 25px;
  background: var(--card-bg);
  border-radius: 20px;
  padding: 15px;
  text-align: left;
  animation: fadeIn 0.5s ease;
}

.detail-header { border-bottom: 1px solid rgba(128,128,128,0.2); padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 15px 0;
}

.stat-item {
  background: rgba(128,128,128,0.1);
  padding: 10px;
  border-radius: 12px;
  text-align: center;
  font-size: 13px;
}
.stat-item i { color: var(--accent-color); display: block; margin-bottom: 5px; }

.description-box {
  font-size: 13px;
  background: rgba(0,0,0,0.04);
  padding: 12px;
  border-radius: 12px;
  position: relative;
}

.copy-desc { position: absolute; top: 10px; right: 10px; color: #00f2ea; cursor: pointer; font-size: 12px; }

video { width: 100%; border-radius: 15px; margin-top: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

.download-link {
  display: block;
  text-align: center;
  background: #00f2ea;
  color: #000;
  padding: 15px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  margin-top: 15px;
}

@keyframes fadeIn { from {opacity: 0; transform: translateY(15px);} to {opacity: 1; transform: translateY(0);} }
</style>
</head>
<body>

<div class="container">
  <div class="social-header">
    <a href="https://youtube.com/@yasiriqbal_01?sub_confirmation=1" target="_blank" class="social-btn btn-yt">
      <i class="fab fa-youtube"></i> Subscribe
    </a>
    <a href="https://www.tiktok.com/@yasiriqbal_01" target="_blank" class="social-btn btn-tt">
      <i class="fab fa-tiktok"></i> Follow
    </a>
    <a href="https://whatsapp.com/channel/0029VbCEdrq0bIdoR2SJiW1S" target="_blank" class="social-btn btn-wa">
      <i class="fab fa-whatsapp"></i> WhatsApp
    </a>
  </div>

  <div class="logo-icon"><i class="fab fa-tiktok"></i></div>
  <h2 style="margin:0 0 20px 0">TikTok Pro Downloader</h2>
  
  <div class="input-wrapper">
    <input type="text" id="url" placeholder="Paste TikTok video link here...">
    <button class="control-btn" onclick="pasteLink()">PASTE</button>
    <button class="control-btn" onclick="clearLink()" style="color:#888">CLEAR</button>
  </div>
  
  <button class="main-btn" onclick="fetchVideo()">
    <i class="fas fa-cloud-download-alt"></i> ANALYZE VIDEO
  </button>

  <div id="result"></div>
</div>

<script>
async function pasteLink() {
  const text = await navigator.clipboard.readText();
  document.getElementById("url").value = text;
}

function clearLink() {
  document.getElementById("url").value = "";
  document.getElementById("result").innerHTML = "";
}

async function fetchVideo() {
  const url = document.getElementById("url").value;
  const result = document.getElementById("result");
  if (!url) { alert("Please paste a link!"); return; }

  result.innerHTML = '<p>⏳ Processing Video Details...</p>';

  try {
    const response = await fetch(`https://tikwm.com/api/?url=${encodeURIComponent(url)}`);
    const json = await response.json();
    const data = json.data;

    if (data) {
      result.innerHTML = `
        <div class="video-info-card">
          <div class="detail-header">Video Details Found</div>
          
          <video controls src="${data.play}"></video>
          
          <div class="stats-grid">
            <div class="stat-item"><i class="fas fa-heart"></i>${data.digg_count}</div>
            <div class="stat-item"><i class="fas fa-comment"></i>${data.comment_count}</div>
            <div class="stat-item"><i class="fas fa-share"></i>${data.share_count}</div>
          </div>

          <div class="description-box">
            <span class="copy-desc" onclick="copyText('${data.title.replace(/'/g, "\\'")}')">
              <i class="fas fa-copy"></i> Copy
            </span>
            <strong>Caption:</strong><br>
            <p id="descText" style="margin:5px 0 0 0">${data.title || "No caption available."}</p>
          </div>

          <a class="download-link" href="javascript:void(0)" onclick="forceDownload('${data.play}', 'tiktok_video.mp4')">
            <i class="fas fa-download"></i> DOWNLOAD NOW
          </a>
        </div>
      `;
    } else {
      result.innerHTML = "<p style='color:red'>❌ Invalid Link! Please check again.</p>";
    }
  } catch (e) {
    result.innerHTML = "<p style='color:red'>⚠️ Connection error. Try again.</p>";
  }
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("Caption Copied to Clipboard!");
}

async function forceDownload(videoUrl, fileName) {
  const response = await fetch(videoUrl);
  const blob = await response.blob();
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  window.URL.revokeObjectURL(url);
}
</script>

</body>
</html>
